name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: streamwave
          POSTGRES_PASSWORD: streamwave
          POSTGRES_DB: streamwave_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U streamwave"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      meilisearch:
        image: getmeili/meilisearch:v1.6
        env:
          MEILI_MASTER_KEY: streamwave_meili_key
          MEILI_ENV: development
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -f http://localhost:7700/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://streamwave:streamwave@localhost:5432/streamwave_dev
      REDIS_URL: redis://localhost:6379
      MEILISEARCH_HOST: http://localhost:7700
      MEILISEARCH_API_KEY: streamwave_meili_key
      NEXTAUTH_SECRET: ci-nextauth-secret-32-chars-minimum
      NEXTAUTH_URL: http://localhost:3000
      JWT_SECRET: ci-jwt-secret-32-chars-minimum!!!!
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type-check (frontend)
        run: npx tsc --noEmit

      - name: Type-check (backend)
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://streamwave:streamwave@localhost:5432/streamwave_dev

      - name: Run server tests
        run: npm run test

      - name: Run client tests
        run: npm run test:client

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXTAUTH_SECRET: ci-nextauth-secret-32-chars-minimum
          NEXTAUTH_URL: http://localhost:3000
