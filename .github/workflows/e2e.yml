name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: streamwave
          POSTGRES_PASSWORD: streamwave
          POSTGRES_DB: streamwave_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U streamwave"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      meilisearch:
        image: getmeili/meilisearch:v1.6
        env:
          MEILI_MASTER_KEY: streamwave_meili_key
          MEILI_ENV: development
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -f http://localhost:7700/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://streamwave:streamwave@localhost:5432/streamwave_dev
      REDIS_URL: redis://localhost:6379
      MEILISEARCH_HOST: http://localhost:7700
      MEILISEARCH_API_KEY: streamwave_meili_key
      NEXTAUTH_SECRET: ci-nextauth-secret-32-chars-minimum
      NEXTAUTH_URL: http://localhost:3000
      JWT_SECRET: ci-jwt-secret-32-chars-minimum!!!!
      FASTIFY_API_URL: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Sync Meilisearch indexes
        run: npx tsx server/scripts/sync-search.ts

      - name: Start dev servers
        run: npm run dev &
        env:
          NODE_ENV: development

      - name: Wait for Next.js to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Wait for Fastify to be ready
        run: npx wait-on http://localhost:3001/health --timeout 30000

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
