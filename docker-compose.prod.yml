# StreamWave — Production Docker Compose
# Deploy via Portainer: Stacks → Add Stack → paste this file → set environment variables
#
# Prerequisites on the Ubuntu host:
#   mkdir -p /data/streamwave/audio
#   cp /your/mp3s/*.mp3 /data/streamwave/audio/
#
# Required env vars (set in Portainer Stack "Environment variables" tab or .env.production):
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   NEXTAUTH_SECRET, NEXTAUTH_URL
#   NEXT_PUBLIC_API_URL
#   MEILISEARCH_API_KEY
#   CLOUDFLARE_TUNNEL_TOKEN

services:
  # ── Next.js frontend ────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    image: streamwave_nextjs:latest
    container_name: streamwave_nextjs
    restart: unless-stopped
    env_file: .env.production
    volumes:
      # Audio files served as static assets from /audio/* routes
      - /data/streamwave/audio:/app/public/audio:ro
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - streamwave

  # ── Fastify API server ───────────────────────────────────────────────────────
  fastify:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: streamwave_fastify:latest
    container_name: streamwave_fastify
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - streamwave

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: streamwave_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamwave

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: streamwave_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamwave

  # ── Meilisearch ───────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: streamwave_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_ENV: production
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - streamwave

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────────
  # Routes:
  #   streamwave.yourdomain.com     → http://nextjs:3000
  #   api.streamwave.yourdomain.com → http://fastify:3001
  # Configure hostnames in Cloudflare Zero Trust dashboard after creating the tunnel.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: streamwave_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nextjs
      - fastify
    networks:
      - streamwave

volumes:
  pgdata:
  redisdata:
  meilidata:

networks:
  streamwave:
    driver: bridge
